<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITN Campaign | Registration Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#e6f2f9 0%,#cde5f0 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */

header{
    background:linear-gradient(95deg,#4A90B8,#2C6E8F);
    padding:20px;
    border-bottom:3px solid #FFD966;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.header-title{
    flex:1;
}

.header-title h1{
    color:white;
    font-size:2rem;
}

.header-title p{
    color:#FFE5B4;
    margin-top:5px;
    font-size:.9rem;
}

.header-logos{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.logo-item{
    background:white;
    padding:8px 12px;
    border-radius:12px;
    text-align:center;
}

.logo-icon{
    font-size:22px;
}

.logo-text{
    font-size:.7rem;
    font-weight:bold;
    color:#2C6E8F;
}

/* MAIN */

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    padding:25px 15px;
}

.card{
    width:100%;
    max-width:320px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card-header{
    background:linear-gradient(95deg,#4A90B8,#2C6E8F);
    color:white;
    padding:30px 20px;
}

.card-header .icon{
    font-size:3rem;
    margin-bottom:10px;
}

.card-header h2{
    font-size:1.5rem;
}

.card-body{
    padding:20px;
}

.card-btn{
    width:100%;
    border:none;
    border-radius:50px;
    padding:14px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    background:linear-gradient(95deg,#4A90B8,#2C6E8F);
}

/* FOOTER */

footer{
    background:#2C6E8F;
    color:#FFE5B4;
    text-align:center;
    padding:15px;
    font-size:.8rem;
}

/* MODAL */

.iframe-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:999;
    justify-content:center;
    align-items:center;
}

.iframe-modal.active{
    display:flex;
}

.modal-container{
    width:95%;
    height:90vh;
    background:white;
    border-radius:18px;
    overflow:hidden;
}

.modal-header{
    background:#2C6E8F;
    color:white;
    padding:12px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.close-iframe-btn{
    border:none;
    border-radius:30px;
    padding:6px 12px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:calc(100% - 50px);
    border:none;
}

/* MOBILE */

@media(max-width:768px){

.header-top{
    flex-direction:column;
    text-align:center;
}

.header-title h1{
    font-size:1.4rem;
}

.header-title p{
    font-size:.8rem;
}

.header-logos{
    justify-content:center;
}

.card{
    max-width:100%;
}

.modal-container{
    width:100%;
    height:100vh;
    border-radius:0;
}

footer{
    font-size:.75rem;
}

}

</style>
</head>

<body>

<header>

<div class="header-top">

<div class="header-title">
<h1>🏥 ITN Mass Campaign</h1>
<p>Insecticide-Treated Nets | Universal Coverage | Malaria Prevention</p>
</div>

<div class="header-logos">

<div class="logo-item">
<div class="logo-icon">🦟</div>
<div class="logo-text">NMCP</div>
</div>

<div class="logo-item">
<div class="logo-icon">🏛️</div>
<div class="logo-text">MOH</div>
</div>

<div class="logo-item">
<div class="logo-icon">🌍</div>
<div class="logo-text">WORLD VISION</div>
</div>

</div>

</div>

</header>

<main>

<div class="card">

<div class="card-header">
<div class="icon">📝</div>
<h2>REGISTRATION</h2>
</div>

<div class="card-body">
<button class="card-btn" onclick="openModal('Registration Form', 'regform.html')">
➕ REGISTER NEW USER
</button>
</div>

</div>

<div class="card">

<div class="card-header">
<div class="icon">📋</div>
<h2>RECORDS</h2>
</div>

<div class="card-body">
<button class="card-btn" onclick="openModal('Records View')">
👁️ VIEW RECORDS
</button>
</div>

</div>

</main>

<footer>

POWERED BY ICF-SL © 2026 | ITN Mass Campaign Management System

</footer>

<div class="iframe-modal" id="iframeModal">

<div class="modal-container">

<div class="modal-header">

<span id="modalTitle">Loading...</span>

<button class="close-iframe-btn" onclick="closeModal()">
✕ Close
</button>

</div>

<iframe id="contentIframe"></iframe>

</div>

</div>

<script>

const modal=document.getElementById("iframeModal");
const iframe=document.getElementById("contentIframe");
const title=document.getElementById("modalTitle");

// Enhanced to accept a target URL string
function openModal(text, pageUrl){

title.innerText=text;

if(pageUrl){
    // If a page URL is provided, load the external html document file
    iframe.removeAttribute("srcdoc");
    iframe.src = pageUrl;
} else {
    // Fallback if no specific file is assigned yet
    iframe.removeAttribute("src");
    iframe.srcdoc=`
    <h2 style="padding:30px;text-align:center;">
    ${text}
    </h2>
    `;
}

modal.classList.add("active");

document.body.style.overflow="hidden";

}

function closeModal(){

modal.classList.remove("active");

document.body.style.overflow="";

// Reset both triggers on closure to keep components clean
iframe.srcdoc="";
iframe.src="";

}

modal.addEventListener("click",(e)=>{

if(e.target===modal){

closeModal();

}

});

</script>

</body>
</html>
