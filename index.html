<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',Arial,sans-serif;
      background:#e8eceb;
      color:#1c2b1c;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:24px 16px;
    }
    .shell{
      width:100%;
      max-width:520px;
      background:#f0f4ed;
      border-radius:28px;
      box-shadow:0 20px 48px rgba(31,41,55,.14);
      overflow:hidden;
    }
    .hero{
      background:#6b7a8d;
      color:#fff;
      padding:28px 22px;
    }
    .hero h1{font-size:24px;margin-bottom:8px}
    .hero p{font-size:14px;line-height:1.5;color:#e5edf5}
    .body{padding:20px}
    .card{
      background:#fff;
      border:1px solid #d4e4cf;
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 10px 24px rgba(31,41,55,.08);
    }
    .eyebrow{
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.8px;
      color:#4a7048;
      margin-bottom:8px;
    }
    .title{font-size:20px;font-weight:700;margin-bottom:8px}
    .meta{font-size:13px;color:#5a7258;line-height:1.65}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      flex:1 1 150px;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:14px;
      font-weight:700;
      text-decoration:none;
      text-align:center;
      cursor:pointer;
    }
    .btn-primary{background:#6b7a8d;color:#fff}
    .btn-secondary{background:#fff;color:#1c2b1c;border:1px solid #d4e4cf}
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <h1>Dashboard</h1>
      <p>This page now shows the logged-in user and their assigned location details.</p>
    </div>
    <div class="body">
      <div class="card">
        <div class="eyebrow">Current session</div>
        <div class="title" id="userName">User</div>
        <div class="meta" id="userMeta"></div>
      </div>
      <div class="card">
        <div class="eyebrow">Module</div>
        <div class="title">Dashboard workspace ready</div>
        <div class="meta">Use this as the dashboard landing page for users who have dashboard access.</div>
      </div>
      <div class="actions">
        <a class="btn btn-primary" href="monitor.html">Open monitoring</a>
        <a class="btn btn-secondary" href="portal.html">Back to portal</a>
      </div>
    </div>
  </div>

  <script>
    function getUser() {
      try {
        return JSON.parse(sessionStorage.getItem('currentUser') || 'null');
      } catch (error) {
        return null;
      }
    }

    function safe(value) {
      return value || 'Not assigned';
    }

    const user = getUser();
    if (!user) {
      window.location.href = 'index.html';
    } else {
      document.getElementById('userName').textContent = safe(user.username);
      document.getElementById('userMeta').innerHTML = `
        Role: ${safe(user.monitor_role || user.role)}<br>
        Region: ${safe(user.region)}<br>
        District: ${safe(user.district || user.assigned_district)}<br>
        Chiefdom: ${safe(user.chiefdom || user.assigned_chiefdom)}<br>
        Health Facility: ${safe(user.health_facility)}<br>
        Community: ${safe(user.community)}
      `;
    }
  </script>
</body>
</html>
