<script>
/* ═══════════════════════════════════════════════
   CONFIG: Replace with your raw GitHub CSV URL
   Example:
   https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/user1.csv
   ═══════════════════════════════════════════════ */
const CSV_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/user1.csv';

/* ── NETWORK INDICATOR ── */
function setNet(online) {
  const pill  = document.getElementById('netPill');
  const label = document.getElementById('netLabel');
  if (online) {
    pill.className  = 'net-pill online';
    label.textContent = 'Online';
  } else {
    pill.className  = 'net-pill offline';
    label.textContent = 'Offline';
  }
}
window.addEventListener('online',  () => setNet(true));
window.addEventListener('offline', () => setNet(false));
setNet(navigator.onLine);

/* ── PASSWORD TOGGLE ── */
function togglePwd() {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}

/* ── CSV PARSER (lightweight, no external libs) ── */
function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"' && !inQuotes) {
      inQuotes = true;
    } else if (char === '"' && inQuotes) {
      inQuotes = false;
    } else if (char === ',' && !inQuotes) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return [];
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const values = parseCSVLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => {
      row[h] = values[idx] !== undefined ? values[idx] : '';
    });
    rows.push(row);
  }
  return rows;
}

/* ── USER LOADER (fetch from GitHub raw) ── */
let cachedUsers = null;
let loadPromise = null;

async function loadUsers() {
  if (cachedUsers) return cachedUsers;
  if (loadPromise) return loadPromise;

  loadPromise = fetch(CSV_URL)
    .then(r => {
      if (!r.ok) throw new Error('Failed to load user database (' + r.status + ')');
      return r.text();
    })
    .then(text => {
      cachedUsers = parseCSV(text);
      return cachedUsers;
    })
    .catch(err => {
      console.error('CSV load error:', err);
      throw err;
    });

  return loadPromise;
}

function getCredentialList() {
  return loadUsers();
}

function normalizeMonitorRole(role) {
  if (!role) return '';
  const r = role.toLowerCase().trim();
  if (r.includes('chief')) return 'chiefdom';
  if (r.includes('nat')) return 'national';
  if (r.includes('indep')) return 'independent';
  return r;
}

function parseAllowedPages(pagesStr) {
  if (!pagesStr) return [];
  return pagesStr.split('|').map(p => p.trim()).filter(p => p.length > 0);
}

function resolveUserRoute(user) {
  const role = (user.role || '').toLowerCase().trim();
  const landing = user.landing_page || 'index.html';
  const allowed = parseAllowedPages(user.allowed_pages);

  if (!allowed.includes('index.html')) {
    allowed.unshift('index.html');
  }

  if (allowed.includes(landing)) {
    return landing;
  }

  if (role === 'admin') return allowed.includes('landing.html') ? 'landing.html' : allowed[0];
  if (role === 'national') return allowed.includes('portal.html') ? 'portal.html' : allowed[0];
  if (role === 'dashboard') return allowed.includes('dash.html') ? 'dash.html' : allowed[0];
  if (role === 'warehouse') return allowed.includes('stock.html') ? 'stock.html' : allowed[0];
  if (role === 'registrar') return allowed.includes('regform.html') ? 'regform.html' : allowed[0];
  if (role === 'distributor') return allowed.includes('dist.html') ? 'dist.html' : allowed[0];
  if (role === 'chisup') return allowed.includes('monitor.html') ? 'monitor.html' : allowed[0];
  if (role === 'independent') return allowed.includes('monitor.html') ? 'monitor.html' : allowed[0];

  return allowed[0] || 'index.html';
}

/* ── ERROR DISPLAY ── */
function showError(msg) {
  let errDiv = document.getElementById('loginError');
  if (!errDiv) {
    errDiv = document.createElement('div');
    errDiv.id = 'loginError';
    errDiv.style.cssText = 'background:#fc8181;color:#fff;padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:13px;font-weight:600;text-align:center;display:none;';
    const formArea = document.querySelector('.form-area');
    if (formArea) formArea.insertBefore(errDiv, formArea.firstChild);
  }
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
  setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
}

/* ── SIGN IN ── */
async function handleSignIn() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember')?.checked || false;

  if (!username || !password) {
    showError('Please enter both username and password.');
    return;
  }

  const btn = document.querySelector('.btn-signin');
  const originalBtnHTML = btn.innerHTML;
  btn.innerHTML = '<span>Loading…</span>';
  btn.disabled = true;

  try {
    const list = await getCredentialList();
    const user = list.find(u => u.username.toLowerCase() === username && u.password === password);

    if (!user) {
      showError('Invalid username or password.');
      btn.innerHTML = originalBtnHTML;
      btn.disabled = false;
      return;
    }

    const allowedPages = parseAllowedPages(user.allowed_pages);
    const monitorRole = normalizeMonitorRole(user.monitor_role);

    const sessionUser = {
      username: user.username,
      role: user.role,
      assigned_district: user.assigned_district || '',
      assigned_chiefdom: user.assigned_chiefdom || '',
      access_level: user.access_level || '',
      monitor_role: monitorRole,
      landing_page: user.landing_page || '',
      allowed_pages: allowedPages,
      region: user.region || '',
      district: user.district || '',
      chiefdom: user.chiefdom || '',
      health_facility: user.health_facility || '',
      community: user.community || '',
      route: resolveUserRoute(user)
    };

    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('currentUser', JSON.stringify(sessionUser));
    storage.setItem('itnSessionExpiry', String(Date.now() + (remember ? 7*24*60*60*1000 : 24*60*60*1000)));

    window.location.href = sessionUser.route;
  } catch (err) {
    showError('Unable to load user database. Check your internet connection and CSV_URL.');
    btn.innerHTML = originalBtnHTML;
    btn.disabled = false;
  }
}

/* ── AUTO-REDIRECT IF ALREADY LOGGED IN ── */
(function autoRedirect() {
  const stored = sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser');
  if (stored) {
    try {
      const user = JSON.parse(stored);
      const expiry = parseInt(sessionStorage.getItem('itnSessionExpiry') || localStorage.getItem('itnSessionExpiry') || '0', 10);
      if (expiry > Date.now() && user.route) {
        window.location.href = user.route;
      }
    } catch (e) {
      // ignore corrupt session
    }
  }
})();

/* ── ENTER KEY SUPPORT ── */
document.addEventListener('DOMContentLoaded', function() {
  // Pre-load CSV in background so login is instant
  loadUsers().catch(() => {});

  document.getElementById('password')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSignIn();
  });
  document.getElementById('username')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
});
</script>
