<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>National Monitor — ITN Mass Campaign 2027</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Segoe UI',Arial,sans-serif;
      background:#e8eceb;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .shell{
      width:100%;
      max-width:520px;
      min-height:100vh;
      background:#f0f4ed;
      display:flex;
      flex-direction:column;
      box-shadow:0 0 40px rgba(0,0,0,0.14);
      position:relative;
    }

    /* ===== STATUS BAR ===== */
    .status-bar{
      background:#6b7a8d;
      color:#e2e8f0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 20px 8px;
      font-size:12px;
      font-weight:500;
      flex-shrink:0;
    }
    .status-right{display:flex;gap:10px;align-items:center;}
    .net-pill{
      display:flex;align-items:center;gap:5px;
      padding:3px 8px 3px 6px;
      border-radius:20px;
      font-size:10px;font-weight:700;letter-spacing:0.3px;
      transition:background 0.4s,color 0.4s;
    }
    .net-pill.online{background:rgba(104,211,145,0.22);color:#68d391;}
    .net-pill.offline{background:rgba(252,129,129,0.22);color:#fc8181;}
    .net-dot{
      width:7px;height:7px;border-radius:50%;flex-shrink:0;
      transition:background 0.4s,box-shadow 0.4s;
    }
    .net-pill.online  .net-dot{background:#68d391;box-shadow:0 0 0 2px rgba(104,211,145,0.3);}
    .net-pill.offline .net-dot{background:#fc8181;box-shadow:0 0 0 2px rgba(252,129,129,0.3);}
    .net-pill.online  span{color:#68d391;}
    .net-pill.offline span{color:#fc8181;}

    /* ===== HEADER ===== */
    .header-band{
      background:#6b7a8d;
      padding:12px 20px 18px;
      flex-shrink:0;
      border-radius:0 0 28px 28px;
    }
    .header-title{
      color:#fff;
      font-size:20px;
      font-weight:800;
      letter-spacing:-0.2px;
      text-align:center;
      margin-top:6px;
    }
    .header-sub{
      color:#d1dbe8;
      font-size:12px;
      font-weight:600;
      text-align:center;
      margin-top:4px;
    }

    /* ===== CONTENT ===== */
    .content{
      flex:1;
      min-height:0;
      padding:14px 14px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:auto;
    }

    /* ── Logged-in User Card ── */
    .user-card{
      background:#fff;
      border:1px solid #d4e4cf;
      border-radius:18px;
      padding:16px 16px 16px 20px;
      box-shadow:0 10px 24px rgba(31,41,55,0.08);
      display:flex;
      align-items:flex-start;
      gap:14px;
    }
    .user-avatar{
      width:46px;height:46px;
      border-radius:14px;
      background:linear-gradient(135deg,#4a7048,#7a9e76);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .user-avatar svg{
      width:24px;height:24px;display:block;stroke:#fff;fill:none;
      stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
    }
    .user-info{flex:1;min-width:0;}
    .user-eyebrow{
      font-size:10px;font-weight:800;
      color:#7a9e76;letter-spacing:1.2px;
      text-transform:uppercase;
      margin-bottom:4px;
    }
    .user-name{
      font-size:18px;font-weight:800;color:#1c2b1c;
      margin-bottom:5px;
      line-height:1.2;
    }
    .user-meta{
      font-size:12px;color:#5a7258;line-height:1.55;
    }

    /* ── Grid ── */
    .grid{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-auto-rows:1fr;
      gap:12px;
    }
    .card{
      background:#fff;
      border:1px solid #d4e4cf;
      border-radius:18px;
      padding:16px;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(31,41,55,0.08);
      transition:transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:#a6c4a4;
      box-shadow:0 14px 30px rgba(31,41,55,0.12);
    }
    .card:active{
      transform:translateY(0);
      box-shadow:0 6px 16px rgba(31,41,55,0.1);
    }

    /* ── Card Icon ── */
    .card-icon-wrap{
      width:44px;height:44px;
      border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      margin-bottom:10px;
      flex-shrink:0;
      transition:transform 0.15s ease;
    }
    .card:hover .card-icon-wrap{transform:scale(1.08);}
    .card-icon-wrap svg{
      width:22px;height:22px;
      display:block;
    }
    .icon-blue{background:#ddf0ff;}
    .icon-blue svg{stroke:#1565c0;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .icon-green{background:#d7f0d7;}
    .icon-green svg{stroke:#2e7d32;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .icon-purple{background:#ede8ff;}
    .icon-purple svg{stroke:#6b46c1;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

    .card-title{font-size:16px;font-weight:900;color:#1c2b1c;}
    .card-sub{font-size:12px;font-weight:600;color:#7a9e76;line-height:1.4;margin-top:6px;}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;font-weight:800;
      padding:5px 10px;border-radius:12px;
      width:max-content;
      margin-top:10px;
    }
    .badge-blue{background:#ddf0ff;color:#1565c0;}
    .badge-green{background:#d7f0d7;color:#2e7d32;}
    .badge-purple{background:#ede8ff;color:#6b46c1;}
    .badge-red{background:#fde8e8;color:#c0392b;}

    .footer-strip{
      background:#6b7a8d;
      color:#d1dbe8;
      text-align:center;
      padding:14px;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.5px;
      border-radius:20px 20px 0 0;
      flex-shrink:0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- STATUS BAR -->
    <div class="status-bar">
      <div></div>
      <div class="status-right">
        <div class="net-pill online" id="netPill">
          <div class="net-dot" id="netDot"></div>
          <span id="netLabel">Online</span>
        </div>
      </div>
    </div>

    <!-- HEADER -->
    <div class="header-band">
      <div class="header-title">National Monitor</div>
      <div class="header-sub" id="headerSub">Select a module</div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- LOGGED-IN USER CARD -->
      <div class="user-card">
        <div class="user-avatar">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="user-info">
          <div class="user-eyebrow">Logged-in user</div>
          <div class="user-name" id="userName">—</div>
          <div class="user-meta" id="userMeta">—</div>
        </div>
      </div>

      <div class="grid">
        <!-- DASHBOARD -->
        <div class="card" onclick="go('dash.html')">
          <div>
            <div class="card-icon-wrap icon-blue">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
              </svg>
            </div>
            <div class="card-title">Dashboard</div>
            <div class="card-sub">Open dashboard workspace</div>
          </div>
          <span class="badge badge-blue">Module</span>
        </div>

        <!-- MONITOR -->
        <div class="card" onclick="go('monitor.html')">
          <div>
            <div class="card-icon-wrap icon-green">
              <svg viewBox="0 0 24 24">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
                <line x1="8" y1="16" x2="13" y2="16"/>
              </svg>
            </div>
            <div class="card-title">Monitor</div>
            <div class="card-sub">Open monitoring forms</div>
          </div>
          <span class="badge badge-green">Module</span>
        </div>

        <!-- RECONCILIATION -->
        <div class="card" onclick="go('recon.html')">
          <div>
            <div class="card-icon-wrap icon-purple">
              <svg viewBox="0 0 24 24">
                <polyline points="17 1 21 5 17 9"/>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </div>
            <div class="card-title">Reconciliation</div>
            <div class="card-sub">Open reconciliation workspace</div>
          </div>
          <span class="badge badge-purple">Module</span>
        </div>

        <!-- LOG OUT -->
        <div class="card" onclick="logout()">
          <div>
            <div class="card-icon-wrap" style="background:#fde8e8;">
              <svg viewBox="0 0 24 24" style="stroke:#c0392b;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;width:22px;height:22px;display:block;">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </div>
            <div class="card-title" style="color:#c0392b;">Log Out</div>
            <div class="card-sub" style="color:#e57373;">Sign out and return to login</div>
          </div>
          <span class="badge badge-red">Exit</span>
        </div>
      </div>
    </div>

    <div class="footer-strip">Powered By ICF-SL</div>
  </div>

  <script>
    /* ── NETWORK INDICATOR ── */
    function setNet(online) {
      const pill  = document.getElementById('netPill');
      const label = document.getElementById('netLabel');
      if (online) {
        pill.className  = 'net-pill online';
        label.textContent = 'Online';
      } else {
        pill.className  = 'net-pill offline';
        label.textContent = 'Offline';
      }
    }
    window.addEventListener('online',  () => setNet(true));
    window.addEventListener('offline', () => setNet(false));
    setNet(navigator.onLine);

    /* ── USER ── */
    function getUser() {
      try { return JSON.parse(sessionStorage.getItem('currentUser') || 'null'); }
      catch (e) { return null; }
    }
    function safe(v) { return (v === undefined || v === null || v === '') ? '—' : String(v); }

    function renderUser() {
      const user = getUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      document.getElementById('userName').textContent = safe(user.username);
      document.getElementById('userMeta').innerHTML =
        `Role: ${safe(user.role)}<br>` +
        `District: ${safe(user.assigned_district)}<br>` +
        `Chiefdom: ${safe(user.assigned_chiefdom)}<br>` +
        `Access: ${safe(user.access_level)}`;
      document.getElementById('headerSub').textContent = `Welcome, ${safe(user.username)}.`;
    }

    function go(page) {
      window.location.href = page;
    }

    function logout() {
      sessionStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }

    renderUser();
  </script>
</body>
</html>
